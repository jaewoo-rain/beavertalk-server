<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BeaverTalk · API 콘솔</title>
<style>
  :root {
    --bg: #0f1115; --surface: #171a21; --surface2: #1f2430; --border: #2a3040;
    --text: #e6e8ee; --muted: #8b93a7; --primary: #00ffb2; --on-primary: #06251c;
    --ok: #1ed45a; --warn: #ffa938; --err: #ff6b6b; --get:#3b82f6; --post:#22c55e;
    --patch:#f59e0b; --put:#a855f7; --delete:#ef4444;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, system-ui, "Pretendard", sans-serif; }
  a { color: var(--primary); }
  code, pre, input, textarea, .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }

  header { position: sticky; top: 0; z-index: 10; background: rgba(15,17,21,.92);
    backdrop-filter: blur(6px); border-bottom: 1px solid var(--border); padding: 12px 16px; }
  .hrow { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  h1 { font-size: 16px; margin: 0 12px 0 0; color: var(--primary); letter-spacing: .3px; }
  .grow { flex: 1; }
  label.f { display: flex; flex-direction: column; gap: 2px; font-size: 11px; color: var(--muted); }
  input, textarea, select { background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 9px; font-size: 13px; }
  input:focus, textarea:focus { outline: none; border-color: var(--primary); }
  textarea { width: 100%; resize: vertical; min-height: 64px; }
  button { cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); border-radius: 8px; padding: 7px 12px; font-size: 13px; }
  button:hover { border-color: var(--primary); }
  button.primary { background: var(--primary); color: var(--on-primary); border-color: var(--primary); font-weight: 700; }
  button.danger { color: var(--err); }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); }
  .badge.on { color: var(--on-primary); background: var(--primary); border-color: var(--primary); }
  .badge.off { color: var(--muted); }

  main { max-width: 1080px; margin: 0 auto; padding: 16px; }
  .vars { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 12px; margin-bottom: 16px; }
  .vars h2 { font-size: 12px; color: var(--muted); margin: 0 0 6px; text-transform: uppercase; letter-spacing: .5px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 12px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 3px 8px; }
  .chip b { color: var(--primary); }
  .chip.empty { color: var(--muted); }

  details.group { margin-bottom: 14px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  details.group > summary { cursor: pointer; list-style: none; padding: 10px 14px; background: var(--surface);
    font-weight: 600; user-select: none; }
  details.group > summary::-webkit-details-marker { display: none; }
  details.group > summary .count { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }

  .card { border-top: 1px solid var(--border); padding: 12px 14px; }
  .card:first-of-type { border-top: none; }
  .line1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .m { font-weight: 700; font-size: 11px; padding: 2px 7px; border-radius: 6px; min-width: 52px; text-align: center; color: #fff; }
  .m.GET{background:var(--get)} .m.POST{background:var(--post)} .m.PATCH{background:var(--patch)}
  .m.PUT{background:var(--put)} .m.DELETE{background:var(--delete)}
  .desc { color: var(--muted); font-size: 12px; }
  .lock { font-size: 11px; color: var(--warn); }
  .path { flex: 1; min-width: 240px; }
  .ctrls { display: flex; gap: 6px; align-items: flex-start; margin-top: 8px; }
  .ctrls .body { flex: 1; }
  .status { font-size: 12px; margin: 8px 0 4px; }
  .status .ok { color: var(--ok); } .status .bad { color: var(--err); } .status .t { color: var(--muted); }
  pre.resp { margin: 0; background: #0b0d11; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; max-height: 320px; overflow: auto; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
  .hint { color: var(--muted); font-size: 11px; margin-top: 6px; }
  .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1>🦫 BeaverTalk API 콘솔</h1>
    <label class="f" style="min-width:130px;">Base URL
      <input id="baseUrl" value="" placeholder="(비우면 같은 오리진)" />
    </label>
    <label class="f grow" style="min-width:260px;">Access Token
      <input id="token" placeholder="로그인하면 자동 입력" />
    </label>
    <span id="authBadge" class="badge off">미인증</span>
    <button id="pingBtn">서버 핑</button>
    <button id="clearVars">변수 초기화</button>
  </div>
</header>

<main>
  <div class="vars">
    <h2>변수 (응답에서 자동 추출 · <code>{{이름}}</code> 으로 경로/바디에 치환)</h2>
    <div id="chips" class="chips"></div>
  </div>
  <div id="groups"></div>
</main>
<div id="toast" class="toast"></div>

<script>
/* ───────────── 상태 ───────────── */
const LS = { vars: 'btc_vars', token: 'btc_token', base: 'btc_base' };
const vars = JSON.parse(localStorage.getItem(LS.vars) || '{}');
const $ = (s, el=document) => el.querySelector(s);
const el = (tag, props={}, ...kids) => {
  const n = Object.assign(document.createElement(tag), props);
  for (const k of kids) n.append(k);
  return n;
};
const baseInput = $('#baseUrl'), tokenInput = $('#token'), authBadge = $('#authBadge');
baseInput.value = localStorage.getItem(LS.base) || '';
tokenInput.value = localStorage.getItem(LS.token) || '';
baseInput.oninput = () => localStorage.setItem(LS.base, baseInput.value.trim());
tokenInput.oninput = () => { localStorage.setItem(LS.token, tokenInput.value.trim()); renderBadge(); };

/* 추출 대상 키 (응답 어디서든 첫 등장값을 변수로 캡처) */
const CAPTURE = ['access_token','member_id','character_id','call_id','sentence_id',
  'review_id','alarm_id','subscribe_id','payment_id','evaluation_id'];

function saveVars(){ localStorage.setItem(LS.vars, JSON.stringify(vars)); renderChips(); }
function renderChips(){
  const c = $('#chips'); c.innerHTML='';
  const keys = Object.keys(vars);
  if(!keys.length){ c.append(el('span',{className:'chip empty'},'아직 없음 — 로그인/조회를 실행해 보세요')); return; }
  for(const k of keys){
    const chip = el('span',{className:'chip'});
    chip.append(el('b',{},k), document.createTextNode(' = '+vars[k]));
    chip.title='클릭하면 이 변수 삭제'; chip.style.cursor='pointer';
    chip.onclick=()=>{ delete vars[k]; saveVars(); };
    c.append(chip);
  }
}
function captureFrom(data){
  const seen = {};
  (function walk(v){
    if(Array.isArray(v)) return v.forEach(walk);
    if(v && typeof v==='object'){
      for(const [k,val] of Object.entries(v)){
        if(CAPTURE.includes(k) && seen[k]===undefined && (typeof val==='string'||typeof val==='number')) seen[k]=val;
        walk(val);
      }
    }
  })(data);
  let changed=false;
  for(const [k,val] of Object.entries(seen)){ vars[k]=val; changed=true; }
  if(seen.access_token){ tokenInput.value=seen.access_token; localStorage.setItem(LS.token, seen.access_token); renderBadge(); }
  if(changed) saveVars();
}
function subst(str){ return String(str).replace(/\{\{(\w+)\}\}/g, (_,k)=> vars[k] ?? `{{${k}}}`); }

/* JWT exp/sub 디코드 (검증 아님, 표시용) */
function decodeJwt(t){
  try{ const p=JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); return p; }catch{ return null; }
}
function renderBadge(){
  const t = tokenInput.value.trim();
  if(!t){ authBadge.className='badge off'; authBadge.textContent='미인증'; return; }
  const p = decodeJwt(t);
  if(!p){ authBadge.className='badge off'; authBadge.textContent='토큰 형식 오류'; return; }
  const exp = p.exp ? new Date(p.exp*1000) : null;
  const expired = exp && exp < new Date();
  authBadge.className = 'badge ' + (expired ? 'off' : 'on');
  const left = exp ? (expired ? '만료됨' : '~'+exp.toLocaleString()) : '';
  authBadge.textContent = `member ${p.sub ?? '?'} · ${left}`;
}

/* ───────────── 호출 ───────────── */
async function apiFetch({method, path, body, form, auth}){
  const base = baseInput.value.trim();
  const url = base.replace(/\/$/,'') + subst(path);
  const headers = {};
  let payload;
  if(form){ headers['Content-Type']='application/x-www-form-urlencoded';
    payload = new URLSearchParams(body).toString(); }
  else if(body!==undefined && method!=='GET' && method!=='DELETE'){
    headers['Content-Type']='application/json'; payload = typeof body==='string'? body : JSON.stringify(body); }
  if(auth!==false && tokenInput.value.trim()) headers['Authorization']='Bearer '+tokenInput.value.trim();
  const t0 = performance.now();
  const res = await fetch(url, {method, headers, body: payload});
  const ms = Math.round(performance.now()-t0);
  let data=null, text='';
  try{ text = await res.text(); data = text? JSON.parse(text): null; }catch{ data = text; }
  return {ok:res.ok, status:res.status, data, ms};
}

/* ───────────── 엔드포인트 정의 ───────────── */
// b: 바디 JSON 템플릿(문자열). form:true → urlencoded. auth:false → 토큰 미부착.
const G = (group, items) => ({group, items});
const ENDPOINTS = [
  G('① auth (인증)', [
    {m:'POST', p:'/api/v1/auth/signup', d:'이메일 회원가입', auth:false,
      b:`{\n  "email": "test@bt.io",\n  "password": "pw1234"\n}`},
    {m:'POST', p:'/api/v1/auth/login', d:'로그인 → JWT (form, username=이메일)', auth:false, form:true,
      b:`{\n  "username": "test@bt.io",\n  "password": "pw1234"\n}`},
    {m:'POST', p:'/api/v1/auth/social', d:'소셜 로그인(스텁)', auth:false,
      b:`{\n  "login_method": "kakao",\n  "token": "kakao-uid-1"\n}`},
    {m:'POST', p:'/api/v1/auth/password-reset/request', d:'재설정 메일 요청', auth:false,
      b:`{\n  "email": "test@bt.io"\n}`},
    {m:'POST', p:'/api/v1/auth/password-reset/confirm', d:'토큰+새 비번', auth:false,
      b:`{\n  "token": "<메일토큰>",\n  "new_password": "newpw"\n}`},
  ]),
  G('② members (회원)', [
    {m:'GET', p:'/api/v1/members/me', d:'내 기본 정보'},
    {m:'GET', p:'/api/v1/members/me/profile', d:'마이페이지(억양+구독여부)'},
    {m:'PATCH', p:'/api/v1/members/me', d:'프로필 수정',
      b:`{\n  "language": "en",\n  "character_id": {{character_id}},\n  "is_auto_payment": true\n}`},
    {m:'DELETE', p:'/api/v1/members/me', d:'회원 탈퇴'},
  ]),
  G('③ characters (캐릭터)', [
    {m:'GET', p:'/api/v1/characters?limit=20&offset=0', d:'목록(할인가·소유여부)'},
    {m:'GET', p:'/api/v1/characters/{{character_id}}', d:'상세'},
    {m:'POST', p:'/api/v1/characters/{{character_id}}/purchase', d:'구매',
      b:`{\n  "card_info": "**** 1234"\n}`},
    {m:'GET', p:'/api/v1/members/me/characters', d:'내 소유 캐릭터'},
  ]),
  G('④ payments / subscriptions (결제·구독)', [
    {m:'GET', p:'/api/v1/payments?type=all&page=1', d:'결제 내역(이번달 합계+10개)'},
    {m:'POST', p:'/api/v1/subscriptions', d:'구독 시작(price>0)',
      b:`{\n  "price": 9900\n}`},
    {m:'GET', p:'/api/v1/subscriptions', d:'내 구독 목록'},
    {m:'POST', p:'/api/v1/subscriptions/{{subscribe_id}}/cancel', d:'구독 취소'},
  ]),
  G('⑤ calls (통화)', [
    {m:'POST', p:'/api/v1/calls', d:'통화 일괄 저장(call+발화+평가+원본)',
      b:`{\n  "character_id": {{character_id}},\n  "call_date": "2026-06-23T10:00:00Z",\n  "total_time": 132,\n  "summary": "카페에서 주문하기",\n  "sentences": [\n    {\n      "korean_sentence": "아메리카노 한 잔 주세요",\n      "native_sentence": "One americano, please",\n      "locale": "en-US",\n      "is_bookmarked": false,\n      "evaluation": { "total_score": 98, "pronunciation": 97, "fluency": 99, "rhythm": 98 }\n    }\n  ],\n  "raw_data": [ { "content": "AI: ...\\nUSER: ...", "total_time": 132 } ]\n}`},
    {m:'GET', p:'/api/v1/calls?limit=20&offset=0', d:'통화 목록(요약)'},
    {m:'GET', p:'/api/v1/calls/{{call_id}}', d:'상세(발화+평가)'},
    {m:'GET', p:'/api/v1/calls/{{call_id}}/result', d:'결과(평균+문장)'},
    {m:'GET', p:'/api/v1/calls/{{call_id}}/raw', d:'원본 데이터'},
    {m:'PATCH', p:'/api/v1/calls/{{call_id}}', d:'만족도(rating 1~3)',
      b:`{\n  "rating": 3\n}`},
    {m:'DELETE', p:'/api/v1/calls/{{call_id}}', d:'통화 삭제(하드)'},
  ]),
  G('⑥ sentences / reviews (발화·복습)', [
    {m:'PATCH', p:'/api/v1/sentences/{{sentence_id}}/bookmark', d:'북마크 토글',
      b:`{\n  "is_bookmarked": true\n}`},
    {m:'DELETE', p:'/api/v1/sentences/{{sentence_id}}', d:'문장 소프트 삭제'},
    {m:'GET', p:'/api/v1/members/me/bookmarks', d:'북마크 발화 모음'},
    {m:'POST', p:'/api/v1/sentences/{{sentence_id}}/reviews', d:'복습 제출 → 채점',
      b:`{\n  "record_time": "2026-06-23T10:05:00Z",\n  "voice_url": null\n}`},
    {m:'GET', p:'/api/v1/sentences/{{sentence_id}}/reviews', d:'복습 이력'},
    {m:'GET', p:'/api/v1/reviews/{{review_id}}/feedback', d:'채점 결과(글자별 상중하)'},
  ]),
  G('⑦ alarms (알람)', [
    {m:'GET', p:'/api/v1/alarms', d:'목록(요일+캐릭터)'},
    {m:'POST', p:'/api/v1/alarms', d:'생성(반복요일)',
      b:`{\n  "character_id": {{character_id}},\n  "time": "2026-06-23T08:00:00Z",\n  "is_activate": true,\n  "days_of_week": ["MON","WED","FRI"]\n}`},
    {m:'GET', p:'/api/v1/alarms/{{alarm_id}}', d:'상세'},
    {m:'PUT', p:'/api/v1/alarms/{{alarm_id}}', d:'수정(요일 전체 교체)',
      b:`{\n  "time": "2026-06-23T09:00:00Z",\n  "is_activate": true,\n  "days_of_week": ["TUE","THU"]\n}`},
    {m:'DELETE', p:'/api/v1/alarms/{{alarm_id}}', d:'삭제'},
    {m:'POST', p:'/api/v1/alarms/{{alarm_id}}/activate', d:'활성화'},
    {m:'POST', p:'/api/v1/alarms/{{alarm_id}}/deactivate', d:'비활성화'},
  ]),
  G('⑧ meta', [
    {m:'GET', p:'/health', d:'헬스체크', auth:false},
  ]),
];

/* ───────────── 렌더 ───────────── */
function renderCard(ep){
  const card = el('div',{className:'card'});
  const line1 = el('div',{className:'line1'});
  line1.append(el('span',{className:'m '+ep.m, textContent:ep.m}));
  const pathIn = el('input',{className:'path mono', value:ep.p});
  line1.append(pathIn);
  if(ep.auth!==false) line1.append(el('span',{className:'lock', textContent:'🔒'}));
  const runBtn = el('button',{className:'primary', textContent:'실행'});
  line1.append(runBtn);
  card.append(line1);
  card.append(el('div',{className:'desc', textContent:ep.d}));

  let bodyIn=null;
  if(ep.b!==undefined){
    const ctrls = el('div',{className:'ctrls'});
    bodyIn = el('textarea',{className:'body mono', value:ep.b, spellcheck:false});
    ctrls.append(bodyIn);
    card.append(ctrls);
    if(ep.form) card.append(el('div',{className:'hint', textContent:'form 전송: JSON 키→urlencoded (username/password)'}));
  }
  const status = el('div',{className:'status'});
  const resp = el('pre',{className:'resp', textContent:'(아직 실행 안 함)'});
  card.append(status, resp);

  if((ep.m==='DELETE') && ep.auth!==false){
    runBtn.classList.add('danger');
  }

  runBtn.onclick = async () => {
    runBtn.disabled=true; status.innerHTML='요청 중…';
    let body;
    if(bodyIn){
      const raw = subst(bodyIn.value);
      if(ep.form){ try{ body=JSON.parse(raw);}catch(e){ status.innerHTML='<span class="bad">바디 JSON 파싱 오류</span>'; runBtn.disabled=false; return; } }
      else body = raw; // JSON 문자열 그대로 전송(서버가 검증)
    }
    try{
      const r = await apiFetch({method:ep.m, path:pathIn.value, body, form:ep.form, auth:ep.auth});
      const cls = r.ok?'ok':'bad';
      status.innerHTML = `<span class="${cls}">${r.status}</span> <span class="t">· ${r.ms}ms</span>`;
      resp.textContent = r.data!==null ? JSON.stringify(r.data, null, 2) : '(빈 응답 / 204)';
      if(r.ok) captureFrom(r.data);
      if(r.status===401){ toast('401 — 토큰이 없거나 만료됐어요. 로그인하세요.'); }
    }catch(e){
      status.innerHTML = `<span class="bad">네트워크 오류</span>`;
      resp.textContent = String(e) + '\n\nBase URL/백엔드(uvicorn) 실행 여부를 확인하세요.';
    }
    runBtn.disabled=false;
  };
  return card;
}

const groupsEl = $('#groups');
ENDPOINTS.forEach((g,i)=>{
  const d = el('details',{className:'group'});
  if(i<2) d.open=true; // 인증·회원만 펼침
  const sum = el('summary');
  sum.append(document.createTextNode(g.group));
  sum.append(el('span',{className:'count', textContent:` ${g.items.length}`}));
  d.append(sum);
  g.items.forEach(ep=> d.append(renderCard(ep)));
  groupsEl.append(d);
});

/* ───────────── 헤더 동작 ───────────── */
$('#pingBtn').onclick = async () => {
  try{ const r = await apiFetch({method:'GET', path:'/health', auth:false});
    toast(`서버 ${r.status} · env=${r.data?.env ?? '?'}`); }
  catch{ toast('서버에 연결 못 했어요 (uvicorn 실행?)'); }
};
$('#clearVars').onclick = () => { for(const k of Object.keys(vars)) delete vars[k]; saveVars(); toast('변수 초기화'); };

let toastTimer;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200); }

renderChips(); renderBadge();
</script>
</body>
</html>
